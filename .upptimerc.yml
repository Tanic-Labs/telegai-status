owner: Tanic-Labs
repo: telegai-status

sites:
  - name: Web
    url: https://www.telegai.com/
    expectedStatusCodes:
      - 200
      - 301

  - name: Edge Functions
    url: https://ywqesktuqvgsmrgraors.supabase.co/functions/v1/fetch-all-service
    expectedStatusCodes:
      - 200

  - name: Database
    url: https://ywqesktuqvgsmrgraors.supabase.co/rest/v1/
    expectedStatusCodes:
      - 200
      - 401

  - name: LLM (OpenRouter)
    url: https://openrouter.ai/api/v1/models
    expectedStatusCodes:
      - 200

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  summary: "0 0 * * *"
  uptime: "*/5 * * * *"

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational
  incidentReport: "Incident Report for $DATE"

commitMessages:
  statusChange: "$EMOJI $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms)"
  degradedPerformance: "$SITE_NAME has degraded performance ($RESPONSE_TIME ms)"
