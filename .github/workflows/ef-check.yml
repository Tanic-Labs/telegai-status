name: Edge Functions Status Check
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check service status via logs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Query Supabase logs and commit status
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: https://ywqesktuqvgsmrgraors.supabase.co
          PROJECT_REF: ywqesktuqvgsmrgraors
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ONE_HOUR_AGO=$(date -u -d "1 hour ago" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u -v-1H +"%Y-%m-%dT%H:%M:%SZ")

          git config user.name "Upptime Bot"
          git config user.email "upptime@telegai.com"

          # check_service TABLE SERVICE_KEY DISPLAY_NAME ERROR_THRESHOLD PATTERN1 [PATTERN2 ...]
          # TABLE: edge_logs or function_edge_logs
          # SERVICE_KEY: key used in uptime_checks table
          # ERROR_THRESHOLD: minimum status code considered an error (400 or 500)
          check_service() {
            local TABLE="$1"
            local SERVICE_KEY="$2"
            local DISPLAY_NAME="$3"
            local ERROR_THRESHOLD="$4"
            shift 4

            # Build regexp filter from remaining args
            REGEXP_FILTER=""
            local first=true
            for pattern in "$@"; do
              if [ "$first" = true ]; then first=false; else REGEXP_FILTER="${REGEXP_FILTER} or "; fi
              REGEXP_FILTER="${REGEXP_FILTER}regexp_contains(t.event_message, '${pattern}')"
            done

            SQL="select r.status_code, count(*) as cnt from ${TABLE} t cross join unnest(t.metadata) as m cross join unnest(m.response) as r where (${REGEXP_FILTER}) group by r.status_code"

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              "https://api.supabase.com/v1/projects/${PROJECT_REF}/analytics/endpoints/logs.all" \
              --data-urlencode "sql=${SQL}" \
              --data-urlencode "iso_timestamp_start=${ONE_HOUR_AGO}" \
              --data-urlencode "iso_timestamp_end=${NOW}" \
              -G)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              echo "API error for ${DISPLAY_NAME}: HTTP ${HTTP_CODE}"
              echo "${BODY}"
              return 0
            fi

            TOTAL=$(echo "$BODY" | jq '[.result[]?.cnt // 0] | add // 0')
            ERRORS=$(echo "$BODY" | jq --arg threshold "$ERROR_THRESHOLD" '[.result[]? | select(.status_code >= ($threshold | tonumber)) | .cnt] | add // 0')

            if [ "$TOTAL" -eq 0 ]; then
              echo "No invocations for ${DISPLAY_NAME} in the last hour"
              ERROR_RATE=0
            else
              ERROR_RATE=$(echo "scale=2; ${ERRORS} * 100 / ${TOTAL}" | bc | sed 's/^\./0./')
            fi

            echo "${DISPLAY_NAME}: ${TOTAL} total, ${ERRORS} errors (>=${ERROR_THRESHOLD}), ${ERROR_RATE}% error rate"

            # Determine status based on error rate and invocation count
            ERROR_INT=$(echo "$ERROR_RATE" | cut -d. -f1)
            ERROR_INT=${ERROR_INT:-0}

            if [ "$TOTAL" -lt 5 ]; then
              STATUS="cold"
              EMOJI="🟦"
            elif [ "$ERROR_INT" -lt 15 ]; then
              STATUS="up"
              EMOJI="🟩"
            elif [ "$ERROR_INT" -lt 30 ]; then
              STATUS="degraded"
              EMOJI="🟨"
            else
              STATUS="down"
              EMOJI="🟥"
            fi

            COMMIT_MSG="${EMOJI} ${DISPLAY_NAME} is ${STATUS} (${ERROR_RATE}% error rate, ${TOTAL} invocations)"
            git commit --allow-empty -m "${COMMIT_MSG}"

            # Insert into Supabase uptime_checks
            curl -s -o /dev/null \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"service\":\"${SERVICE_KEY}\",\"status\":\"${STATUS}\",\"error_rate\":${ERROR_RATE},\"total_invocations\":${TOTAL}}" \
              "${SUPABASE_URL}/rest/v1/uptime_checks"

            echo "Committed: ${COMMIT_MSG}"
          }

          # Web (simple HTTP check)
          check_web() {
            local HTTP_CODE
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "https://www.telegai.com/")

            if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 400 ]]; then
              STATUS="up"
              EMOJI="🟩"
            elif [[ "$HTTP_CODE" -ge 400 && "$HTTP_CODE" -lt 500 ]]; then
              STATUS="degraded"
              EMOJI="🟨"
            else
              STATUS="down"
              EMOJI="🟥"
            fi

            COMMIT_MSG="${EMOJI} Web is ${STATUS} (HTTP ${HTTP_CODE})"
            git commit --allow-empty -m "${COMMIT_MSG}"

            curl -s -o /dev/null \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"service\":\"web\",\"status\":\"${STATUS}\",\"error_rate\":0,\"total_invocations\":1}" \
              "${SUPABASE_URL}/rest/v1/uptime_checks"

            echo "Committed: ${COMMIT_MSG}"
          }

          # check_metrics SERVICE_KEY DISPLAY_NAME METRICS_URL
          # Hits a Prometheus /metrics endpoint and checks vllm:num_requests_running
          check_metrics() {
            local SERVICE_KEY="$1"
            local DISPLAY_NAME="$2"
            local METRICS_URL="$3"

            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 "${METRICS_URL}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 400 ]]; then
              RUNNING=$(echo "$BODY" | grep -oP 'vllm:num_requests_running\{[^}]*\}\s+\K[\d.]+' | head -1)
              if [ -n "$RUNNING" ]; then
                RUNNING_INT=$(echo "$RUNNING" | cut -d. -f1)
                if [ "$RUNNING_INT" -gt 30 ]; then
                  STATUS="degraded"
                  EMOJI="🟨"
                else
                  STATUS="up"
                  EMOJI="🟩"
                fi
                DETAIL="${RUNNING} running requests"
              else
                STATUS="up"
                EMOJI="🟩"
                DETAIL="HTTP ${HTTP_CODE}"
              fi
            else
              STATUS="down"
              EMOJI="🟥"
              DETAIL="HTTP ${HTTP_CODE}"
            fi

            COMMIT_MSG="${EMOJI} ${DISPLAY_NAME} is ${STATUS} (${DETAIL})"
            git commit --allow-empty -m "${COMMIT_MSG}"

            curl -s -o /dev/null \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"service\":\"${SERVICE_KEY}\",\"status\":\"${STATUS}\",\"error_rate\":0,\"total_invocations\":1}" \
              "${SUPABASE_URL}/rest/v1/uptime_checks"

            echo "Committed: ${COMMIT_MSG}"
          }

          check_web

          # Edge Functions (error threshold: >= 400)
          check_service function_edge_logs "image-rotation"    "Image Rotation"    400 '/functions/v1/angle-rotation-wavespeed$'
          check_service function_edge_logs "audio-generation"  "Audio Generation"  400 '/functions/v1/chatterbox-tts$'
          check_service function_edge_logs "voice-generation"  "Voice Generation"  400 '/functions/v1/fish-tts$'
          check_metrics "image-generation" "Image Generation" "https://vision.termo.ai/metrics"
          check_service function_edge_logs "video-generation"  "Video Generation"  400 '/functions/v1/wan-video-generation$'
          check_metrics "context" "Context" "https://cydonia.termo.ai/metrics"
          check_metrics "quality" "Quality" "https://gpu.termo.ai/metrics"

          # Database (error threshold: >= 500, only server errors)
          check_service edge_logs "database" "Database" 500 '/rest/v1/'

          git pull --rebase origin main || true
          git push || true
