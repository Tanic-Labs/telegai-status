<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TelegAI Status</title>
  <meta name="description" content="Real-time status and uptime monitoring for TelegAI services.">
  <link rel="icon" href="https://www.telegai.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface-2: #18181b;
      --surface-3: #1e1e22;
      --text-1: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --text-4: #3f3f46;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --border: rgba(255,255,255,0.06);
      --border-2: rgba(255,255,255,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* -- Header -- */
    header {
      padding: 40px 0 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 7px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .refresh-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-4);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .refresh-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-4);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* -- Overall Status Banner -- */
    .status-banner {
      margin: 32px 0;
      padding: 24px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .status-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0.5;
    }

    .status-banner.operational { background: var(--green-dim); border-color: rgba(34, 197, 94, 0.15); }
    .status-banner.degraded { background: var(--yellow-dim); border-color: rgba(234, 179, 8, 0.15); }
    .status-banner.down { background: var(--red-dim); border-color: rgba(239, 68, 68, 0.15); }

    .banner-content {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .banner-dot-wrap {
      position: relative;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .banner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
      top: 1px;
      left: 1px;
    }

    .banner-dot-pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 0;
      left: 0;
      animation: pulse 2s ease-out infinite;
    }

    .operational .banner-dot { background: var(--green); }
    .operational .banner-dot-pulse { background: var(--green); }
    .degraded .banner-dot { background: var(--yellow); }
    .degraded .banner-dot-pulse { background: var(--yellow); }
    .down .banner-dot { background: var(--red); }
    .down .banner-dot-pulse { background: var(--red); }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .banner-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .banner-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .operational .banner-label { color: var(--green); }
    .degraded .banner-label { color: var(--yellow); }
    .down .banner-label { color: var(--red); }

    .banner-meta {
      font-size: 12px;
      color: var(--text-3);
    }

    /* -- Section Headers -- */
    .section-header {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    /* -- Service Cards -- */
    .services {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 48px;
      border: 1px solid var(--border);
    }

    .service-card {
      background: var(--surface);
      padding: 20px 24px;
    }

    .service-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .service-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
    }

    .service-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 100px;
      letter-spacing: 0.01em;
    }

    .status-badge.up { background: var(--green-dim); color: var(--green); }
    .status-badge.degraded { background: var(--yellow-dim); color: var(--yellow); }
    .status-badge.down { background: var(--red-dim); color: var(--red); }
    .status-badge.unknown { background: rgba(255,255,255,0.05); color: var(--text-3); }

    /* -- Uptime Bar -- */
    .bars-container {
      position: relative;
    }

    .no-data-msg {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-4);
      background: var(--surface-2);
      border-radius: 3px;
      letter-spacing: 0.01em;
    }

    .bars-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-4);
    }

    .bars-footer-center {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
    }

    .bars-footer-center .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-4);
    }

    /* -- Tooltip -- */
    .tooltip {
      display: none;
      position: fixed;
      background: var(--surface-3);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-2);
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      line-height: 1.6;
    }

    .tooltip.visible { display: block; }
    .tooltip-time { color: var(--text-1); font-weight: 500; }
    .tooltip-status { display: flex; align-items: center; gap: 6px; }
    .tooltip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tooltip-dot.up { background: var(--green); }
    .tooltip-dot.degraded { background: var(--yellow); }
    .tooltip-dot.down { background: var(--red); }
    .tooltip-dot.empty { background: var(--text-4); }

    /* -- Incidents -- */
    .incidents {
      margin-bottom: 48px;
    }

    .incidents-empty {
      text-align: center;
      padding: 32px 0;
      font-size: 13px;
      color: var(--text-4);
    }

    .incident-day {
      margin-bottom: 24px;
    }

    .incident-day:last-child {
      margin-bottom: 0;
    }

    .incident-date {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-3);
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .incident-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 6px;
    }

    .incident-card:last-child {
      margin-bottom: 0;
    }

    .incident-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .incident-severity {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .incident-severity.major { background: var(--red); }
    .incident-severity.minor { background: var(--yellow); }

    .incident-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
    }

    .incident-times {
      padding-left: 15px;
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .incident-time {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .incident-time-label {
      color: var(--text-4);
      min-width: 56px;
    }

    /* -- Footer -- */
    footer {
      padding: 32px 0 48px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer a {
      color: var(--text-4);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text-3); }

    .footer-right {
      font-size: 11px;
      color: var(--text-4);
    }

    /* -- Loading -- */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-3);
      font-size: 13px;
    }

    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--text-3);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* -- Responsive -- */
    @media (max-width: 520px) {
      header { padding: 28px 0 0; }
      .status-banner { padding: 18px 20px; margin: 24px 0; }
      .service-card { padding: 16px 18px; }
      .banner-label { font-size: 14px; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-inner">
        <div class="header-left">
          <img src="https://www.telegai.com/favicon.ico" alt="TelegAI" class="header-logo">
          <span class="header-title">TelegAI Status</span>
        </div>
        <div class="header-right">
          <div class="refresh-badge">
            <span class="refresh-dot"></span>
            <span>Live</span>
          </div>
        </div>
      </div>
    </header>

    <div id="app">
      <div class="loading">
        <div class="loading-spinner"></div>
        Loading status...
      </div>
    </div>

    <footer>
      <a href="https://www.telegai.com" target="_blank" rel="noopener">telegai.com</a>
      <span class="footer-right">Auto-refreshes every 60s</span>
    </footer>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    /* -- Config -- */
    const UPPTIME_URL = 'https://raw.githubusercontent.com/Tanic-Labs/telegai-status/main/history/summary.json';

    const SERVICES = [
      { key: 'web', label: 'Web' },
      { key: 'database', label: 'Database' },
      { key: 'llm-open-router', label: 'LLM - OpenRouter' },
      { key: 'llm-novita-ai', label: 'LLM - Novita AI' },
      { key: 'ef-angle-rotation-wavespeed', label: 'EF - Angle Rotation Wavespeed' },
      { key: 'ef-chatterbox-tts', label: 'EF - Chatterbox TTS' },
      { key: 'ef-generate-voice-candidates', label: 'EF - Generate Voice Candidates' },
      { key: 'ef-generate-voice-from-candidate', label: 'EF - Generate Voice from Candidate' },
      { key: 'ef-qwen-image-edit', label: 'EF - Qwen Image Edit' },
      { key: 'ef-wan-video-generation', label: 'EF - Wan Video Generation' },
    ];

    const REFRESH_MS = 60_000;

    /* -- Data Fetching -- */
    async function fetchUpptime() {
      try {
        const r = await fetch(UPPTIME_URL);
        return r.ok ? r.json() : [];
      } catch { return []; }
    }

    async function loadAll() {
      const [upptime] = await Promise.allSettled([
        fetchUpptime(),
      ]);
      return {
        upptime: upptime.status === 'fulfilled' ? upptime.value : [],
      };
    }

    /* -- Helpers -- */
    function resolveUptimeStatus(svc) {
      const pct = parseFloat(svc.uptimeDay || svc.uptime || '0');
      if (pct >= 99) return 'up';
      if (pct >= 90) return 'degraded';
      return 'down';
    }

    function statusLabel(s) {
      if (s === 'up') return 'Operational';
      if (s === 'degraded') return 'Degraded';
      if (s === 'down') return 'Down';
      return 'Unknown';
    }

    function overallLabel(s) {
      if (s === 'operational') return 'All Systems Operational';
      if (s === 'degraded') return 'Experiencing Degraded Performance';
      return 'Some Systems Down';
    }

    function timeAgo(iso) {
      const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
      return `${Math.floor(s / 86400)}d ago`;
    }

    /* -- Build Service Data -- */
    function buildServiceData(data) {
      const uptimeMap = {};
      for (const svc of data.upptime) {
        uptimeMap[svc.slug] = svc;
      }

      const services = [];
      for (const svc of SERVICES) {
        const ut = uptimeMap[svc.key];
        let currentStatus = 'unknown';
        let responseTime = null;
        let uptimePct = null;

        if (ut) {
          currentStatus = resolveUptimeStatus(ut);
          responseTime = ut.time || null;
          uptimePct = parseFloat(ut.uptimeDay || ut.uptime || '100').toFixed(2);
        }

        services.push({
          key: svc.key,
          label: svc.label,
          status: currentStatus,
          uptimePct,
          avgMs: responseTime,
        });
      }

      return services;
    }

    /* -- Render -- */
    function render(data) {
      const app = document.getElementById('app');
      const services = buildServiceData(data);

      // Overall status
      const statuses = services.map(s => s.status);
      const overall = statuses.includes('down') ? 'down'
        : statuses.includes('degraded') ? 'degraded' : 'operational';

      let html = '';

      // Banner
      html += `
        <div class="status-banner ${overall}">
          <div class="banner-content">
            <div class="banner-dot-wrap">
              <div class="banner-dot-pulse"></div>
              <div class="banner-dot"></div>
            </div>
            <div class="banner-text">
              <span class="banner-label">${overallLabel(overall)}</span>
              <span class="banner-meta">Monitoring ${services.length} services</span>
            </div>
          </div>
        </div>
      `;

      // Services
      html += '<div class="section-header">Services</div>';
      html += '<div class="services">';

      for (const svc of services) {
        html += `<div class="service-card">`;
        html += `<div class="service-top">`;
        html += `<span class="service-name">${svc.label}</span>`;
        html += `<span class="status-badge ${svc.status}">${statusLabel(svc.status)}</span>`;
        html += `</div>`;

        html += `<div class="bars-container">`;
        html += `<div class="bars-footer">`;
        html += `<span></span>`;
        html += `<div class="bars-footer-center">`;
        if (svc.uptimePct !== null) html += `<span>${svc.uptimePct}% uptime</span>`;
        if (svc.uptimePct !== null && svc.avgMs) html += `<span class="sep"></span>`;
        if (svc.avgMs) html += `<span>${svc.avgMs}ms avg</span>`;
        html += `</div>`;
        html += `<span></span>`;
        html += `</div>`;
        html += `</div>`;

        html += `</div>`;
      }

      html += '</div>';

      // Incidents from dailyMinutesDown
      html += '<div class="incidents">';
      html += '<div class="section-header">Recent Incidents</div>';

      const incidents = [];
      const svcLabels = Object.fromEntries(SERVICES.map(s => [s.key, s.label]));

      for (const ut of data.upptime) {
        if (ut.dailyMinutesDown) {
          for (const [date, minutes] of Object.entries(ut.dailyMinutesDown)) {
            if (minutes > 0) {
              incidents.push({
                service: ut.slug,
                label: ut.name,
                date,
                minutes,
              });
            }
          }
        }
      }

      if (incidents.length === 0) {
        html += '<div class="incidents-empty">No incidents in the last 7 days</div>';
      } else {
        // Group by date
        const byDay = {};
        for (const inc of incidents) {
          if (!byDay[inc.date]) byDay[inc.date] = [];
          byDay[inc.date].push(inc);
        }
        const sortedDays = Object.keys(byDay).sort().reverse();
        for (const day of sortedDays) {
          const d = new Date(day + 'T00:00:00');
          const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
          html += `<div class="incident-day">`;
          html += `<div class="incident-date">${label}</div>`;
          for (const inc of byDay[day]) {
            const severity = inc.minutes > 30 ? 'major' : 'minor';
            html += `<div class="incident-card">`;
            html += `<div class="incident-header">`;
            html += `<span class="incident-severity ${severity}"></span>`;
            html += `<span class="incident-title">${inc.label} &mdash; ${inc.minutes} min downtime</span>`;
            html += `</div>`;
            html += `</div>`;
          }
          html += `</div>`;
        }
      }

      html += '</div>';

      app.innerHTML = html;
    }

    /* -- Init -- */
    async function init() {
      const data = await loadAll();
      render(data);
      setInterval(async () => {
        const fresh = await loadAll();
        render(fresh);
      }, REFRESH_MS);
    }

    init();
  </script>
</body>
</html>
