<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TelegAI Status</title>
  <meta name="description" content="Real-time status and uptime monitoring for TelegAI services.">
  <link rel="icon" href="https://www.telegai.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface-2: #18181b;
      --surface-3: #1e1e22;
      --text-1: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --text-4: #3f3f46;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.12);
      --border: rgba(255,255,255,0.06);
      --border-2: rgba(255,255,255,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

    header { padding: 40px 0 0; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 28px; height: 28px; border-radius: 7px; }
    .header-title { font-size: 16px; font-weight: 600; color: var(--text-1); letter-spacing: -0.01em; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .refresh-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-4); letter-spacing: 0.02em; text-transform: uppercase; }
    .refresh-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-4); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    .status-banner { margin: 32px 0; padding: 24px 28px; border-radius: var(--radius); border: 1px solid var(--border); position: relative; overflow: hidden; }
    .status-banner::before { content: ''; position: absolute; inset: 0; border-radius: inherit; opacity: 0.5; }
    .status-banner.operational { background: var(--green-dim); border-color: rgba(34, 197, 94, 0.15); }
    .status-banner.degraded { background: var(--yellow-dim); border-color: rgba(234, 179, 8, 0.15); }
    .status-banner.down { background: var(--red-dim); border-color: rgba(239, 68, 68, 0.15); }
    .banner-content { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
    .banner-dot-wrap { position: relative; width: 12px; height: 12px; flex-shrink: 0; }
    .banner-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; top: 1px; left: 1px; }
    .banner-dot-pulse { width: 12px; height: 12px; border-radius: 50%; position: absolute; top: 0; left: 0; animation: pulse 2s ease-out infinite; }
    .operational .banner-dot { background: var(--green); }
    .operational .banner-dot-pulse { background: var(--green); }
    .degraded .banner-dot { background: var(--yellow); }
    .degraded .banner-dot-pulse { background: var(--yellow); }
    .down .banner-dot { background: var(--red); }
    .down .banner-dot-pulse { background: var(--red); }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
    .banner-text { display: flex; flex-direction: column; gap: 2px; }
    .banner-label { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .operational .banner-label { color: var(--green); }
    .degraded .banner-label { color: var(--yellow); }
    .down .banner-label { color: var(--red); }
    .banner-meta { font-size: 12px; color: var(--text-3); }

    .section-header { font-size: 12px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; padding: 0 4px; }

    .services { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 48px; border: 1px solid var(--border); }
    .service-card { background: var(--surface); padding: 20px 24px; }
    .service-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .service-name { font-size: 14px; font-weight: 500; color: var(--text-1); }
    .status-badge { font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: 100px; letter-spacing: 0.01em; }
    .status-badge.up { background: var(--green-dim); color: var(--green); }
    .status-badge.degraded { background: var(--yellow-dim); color: var(--yellow); }
    .status-badge.down { background: var(--red-dim); color: var(--red); }
    .status-badge.cold { background: var(--green-dim); color: var(--green); }
    .status-badge.unknown { background: rgba(255,255,255,0.05); color: var(--text-3); }

    .bars-container { position: relative; }
    .bars { display: flex; gap: 2px; height: 32px; align-items: stretch; }
    .bar { flex: 1; border-radius: 3px; min-width: 0; cursor: pointer; transition: opacity 0.12s ease, transform 0.12s ease; position: relative; }
    .bar:hover { opacity: 0.7; transform: scaleY(1.1); transform-origin: bottom; }
    .bar.up { background: var(--green); }
    .bar.degraded { background: var(--yellow); }
    .bar.down { background: var(--red); }
    .bar.cold { background: var(--green); }
    .bar.empty { background: var(--surface-2); }
    .bars-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-4); }
    .bars-footer-center { display: flex; align-items: center; gap: 12px; color: var(--text-3); }
    .bars-footer-center .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--text-4); }

    .tooltip { display: none; position: fixed; background: var(--surface-3); border: 1px solid var(--border-2); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--text-2); pointer-events: none; z-index: 100; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.5); line-height: 1.6; }
    .tooltip.visible { display: block; }
    .tooltip-time { color: var(--text-1); font-weight: 500; }
    .tooltip-status { display: flex; align-items: center; gap: 6px; }
    .tooltip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tooltip-dot.up { background: var(--green); }
    .tooltip-dot.degraded { background: var(--yellow); }
    .tooltip-dot.down { background: var(--red); }
    .tooltip-dot.cold { background: var(--green); }
    .tooltip-dot.empty { background: var(--text-4); }

    .incidents { margin-bottom: 48px; }
    .incidents-empty { text-align: center; padding: 32px 0; font-size: 13px; color: var(--text-4); }
    .incident-day { margin-bottom: 24px; }
    .incident-day:last-child { margin-bottom: 0; }
    .incident-date { font-size: 12px; font-weight: 500; color: var(--text-3); margin-bottom: 8px; padding: 0 4px; }
    .incident-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 6px; }
    .incident-card:last-child { margin-bottom: 0; }
    .incident-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .incident-severity { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .incident-severity.major { background: var(--red); }
    .incident-severity.minor { background: var(--yellow); }
    .incident-title { font-size: 13px; font-weight: 500; color: var(--text-1); }

    .legend { margin-bottom: 48px; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-dot.up { background: var(--green); }
    .legend-dot.degraded { background: var(--yellow); }
    .legend-dot.down { background: var(--red); }
    .legend-dot.cold { background: var(--blue); }
    .legend-dot.empty { background: var(--surface-2); }

    footer { padding: 32px 0 48px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    footer a { color: var(--text-4); text-decoration: none; font-size: 12px; transition: color 0.15s; }
    footer a:hover { color: var(--text-3); }
    .footer-right { font-size: 11px; color: var(--text-4); }

    .loading { text-align: center; padding: 80px 0; color: var(--text-3); font-size: 13px; }
    .loading-spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--text-3); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      header { padding: 28px 0 0; }
      .status-banner { padding: 18px 20px; margin: 24px 0; }
      .service-card { padding: 16px 18px; }
      .bars { height: 28px; gap: 1.5px; }
      .banner-label { font-size: 14px; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-inner">
        <div class="header-left">
          <img src="https://www.telegai.com/favicon.ico" alt="TelegAI" class="header-logo">
          <span class="header-title">TelegAI Status</span>
        </div>
        <div class="header-right">
          <div class="refresh-badge">
            <span class="refresh-dot"></span>
            <span>Live</span>
          </div>
        </div>
      </div>
    </header>

    <div id="app">
      <div class="loading">
        <div class="loading-spinner"></div>
        Loading status...
      </div>
    </div>

    <footer>
      <a href="https://www.telegai.com" target="_blank" rel="noopener">telegai.com</a>
      <span class="footer-right">Auto-refreshes every 60s</span>
    </footer>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    /* -- Config -- */
    const SUPABASE_URL = 'https://ywqesktuqvgsmrgraors.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3cWVza3R1cXZnc21yZ3Jhb3JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAxNzM4MzgsImV4cCI6MjAxNTc0OTgzOH0.TkNvW9CGa9Z3xzoPiSS2bQS9aDWyU_thaWO3PVFN7T0';

    const SERVICES = [
      { key: 'web', label: 'Web' },
      { key: 'database', label: 'Database' },
      { key: 'context', label: 'Context' },
      { key: 'quality', label: 'Quality' },
      { key: 'reasoning', label: 'Reasoning' },
      { key: 'image-rotation', label: 'Image Rotation' },
      { key: 'audio-generation', label: 'Audio Generation' },
      { key: 'voice-generation', label: 'Voice Generation' },
      { key: 'image-generation', label: 'Image Generation' },
      { key: 'video-generation', label: 'Video Generation' },
    ];

    const HOURS = 24;
    const REFRESH_MS = 60_000;

    /* -- Data Fetching -- */
    async function rpc(fn, params = {}) {
      try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        return r.ok ? r.json() : [];
      } catch { return []; }
    }

    async function loadAll() {
      const [hourly, current, incidents] = await Promise.allSettled([
        rpc('get_uptime_hourly', { hours_back: HOURS }),
        rpc('get_current_status'),
        rpc('get_recent_incidents', { days_back: 7 }),
      ]);
      return {
        hourly: hourly.status === 'fulfilled' ? hourly.value : [],
        current: current.status === 'fulfilled' ? current.value : [],
        incidents: incidents.status === 'fulfilled' ? incidents.value : [],
      };
    }

    /* -- Helpers -- */
    function getHourSlots() {
      const slots = [];
      const now = new Date();
      for (let i = HOURS - 1; i >= 0; i--) {
        const d = new Date(now);
        d.setMinutes(0, 0, 0);
        d.setHours(d.getHours() - i);
        slots.push(d.toISOString());
      }
      return slots;
    }

    function formatHour(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function formatHourRange(iso) {
      const d = new Date(iso);
      const end = new Date(d);
      end.setHours(end.getHours() + 1);
      return `${formatHour(iso)} \u2013 ${formatHour(end.toISOString())}`;
    }

    function statusLabel(s) {
      if (s === 'up') return 'Operational';
      if (s === 'degraded') return 'Degraded';
      if (s === 'cold') return 'Operational';
      if (s === 'down') return 'Down';
      return 'No data';
    }

    function overallLabel(s) {
      if (s === 'operational') return 'All Systems Operational';
      if (s === 'degraded') return 'Experiencing Degraded Performance';
      return 'Some Systems Down';
    }

    /* -- Build Service Data -- */
    function buildServiceData(data) {
      const slots = getHourSlots();

      // Index hourly data by service + hour
      // Normalize to YYYY-MM-DDTHH to avoid millisecond/format mismatches
      function hourKey(service, dateStr) {
        const d = new Date(dateStr);
        return `${service}:${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}T${String(d.getUTCHours()).padStart(2,'0')}`;
      }
      const hourlyMap = {};
      for (const row of data.hourly) {
        hourlyMap[hourKey(row.service, row.hour)] = row;
      }

      // Index current status by service
      const currentMap = {};
      for (const row of data.current) {
        currentMap[row.service] = row;
      }

      const now = new Date();
      const currentHour = new Date(now);
      currentHour.setMinutes(0, 0, 0);
      const currentHourISO = currentHour.toISOString();

      const services = [];
      for (const svc of SERVICES) {
        const hours = [];
        let totalChecks = 0;
        let correctChecks = 0;

        for (const slot of slots) {
          const h = hourlyMap[hourKey(svc.key, slot)];
          const isCurrentHour = slot === currentHourISO;

          if (h) {
            const correct = Number(h.correct_checks);
            const total = Number(h.total_checks);

            let status;
            if (isCurrentHour) {
              // Current hour: use latest check status directly
              const cur = currentMap[svc.key];
              status = cur ? cur.status : h.hour_status;
            } else {
              // Past hours: 9-12 correct = up, 5-8 = degraded, 0-4 = down
              status = h.hour_status;
            }

            hours.push({
              hour: slot,
              status,
              total,
              correct,
            });
            totalChecks += total;
            correctChecks += correct;
          } else {
            hours.push({ hour: slot, status: 'empty', total: 0, correct: 0 });
          }
        }

        // Current status from latest check
        const cur = currentMap[svc.key];
        const currentStatus = cur ? cur.status : 'unknown';

        // Uptime percentage
        let uptimePct = null;
        if (totalChecks > 0) {
          uptimePct = ((correctChecks / totalChecks) * 100).toFixed(2);
        }

        services.push({
          key: svc.key,
          label: svc.label,
          status: currentStatus,
          hours,
          uptimePct,
          hasData: totalChecks > 0,
        });
      }

      return services;
    }

    /* -- Render -- */
    function render(data) {
      const app = document.getElementById('app');
      const services = buildServiceData(data);

      const statuses = services.map(s => s.status);
      const overall = statuses.includes('down') ? 'down'
        : statuses.includes('degraded') ? 'degraded' : 'operational';

      let html = '';

      // Banner
      html += `
        <div class="status-banner ${overall}">
          <div class="banner-content">
            <div class="banner-dot-wrap">
              <div class="banner-dot-pulse"></div>
              <div class="banner-dot"></div>
            </div>
            <div class="banner-text">
              <span class="banner-label">${overallLabel(overall)}</span>
              <span class="banner-meta">Monitoring ${services.length} services</span>
            </div>
          </div>
        </div>
      `;

      // Services
      html += '<div class="section-header">Uptime &mdash; Last 24 hours</div>';
      html += '<div class="services">';

      for (const svc of services) {
        html += `<div class="service-card">`;
        html += `<div class="service-top">`;
        html += `<span class="service-name">${svc.label}</span>`;
        html += `<span class="status-badge ${svc.status}">${statusLabel(svc.status)}</span>`;
        html += `</div>`;

        html += `<div class="bars-container">`;

        if (svc.hasData) {
          html += `<div class="bars">`;
          const currentHourISO = new Date(new Date().setMinutes(0,0,0)).toISOString();
          for (const h of svc.hours) {
            const isCurrentHour = h.hour === currentHourISO;
            const detail = h.total > 0
              ? (isCurrentHour ? `${h.total}/12 checks` : `${h.correct}/12 checks correct`)
              : 'No data';
            html += `<div class="bar ${h.status}"
              data-time="${formatHourRange(h.hour)}"
              data-status="${h.status}"
              data-detail="${detail}"></div>`;
          }
          html += `</div>`;
          html += `<div class="bars-footer">`;
          html += `<span>24h ago</span>`;
          html += `<div class="bars-footer-center">`;
          if (svc.uptimePct !== null) html += `<span>${svc.uptimePct}% uptime</span>`;
          html += `</div>`;
          html += `<span>Now</span>`;
          html += `</div>`;
        } else {
          html += `<div class="bars-footer">`;
          html += `<span></span>`;
          html += `<div class="bars-footer-center">`;
          if (svc.uptimePct !== null) html += `<span>${svc.uptimePct}% uptime</span>`;
          html += `</div>`;
          html += `<span></span>`;
          html += `</div>`;
        }

        html += `</div>`;
        html += `</div>`;
      }

      html += '</div>';

      // Incidents
      html += '<div class="incidents">';
      html += '<div class="section-header">Recent Incidents</div>';

      const incidents = data.incidents || [];

      if (incidents.length === 0) {
        html += '<div class="incidents-empty">No incidents in the last 7 days</div>';
      } else {
        const byDay = {};
        for (const inc of incidents) {
          const day = new Date(inc.checked_at).toISOString().slice(0, 10);
          if (!byDay[day]) byDay[day] = [];
          byDay[day].push(inc);
        }
        for (const day of Object.keys(byDay).sort().reverse()) {
          const d = new Date(day + 'T00:00:00');
          const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
          html += `<div class="incident-day">`;
          html += `<div class="incident-date">${label}</div>`;
          for (const inc of byDay[day]) {
            const svcLabel = SERVICES.find(s => s.key === inc.service)?.label || inc.service;
            const time = new Date(inc.checked_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            html += `<div class="incident-card">`;
            html += `<div class="incident-header">`;
            html += `<span class="incident-severity major"></span>`;
            html += `<span class="incident-title">${svcLabel} &mdash; Down at ${time}</span>`;
            html += `</div>`;
            html += `</div>`;
          }
          html += `</div>`;
        }
      }

      html += '</div>';

      // Color legend
      html += `
        <div class="legend">
          <div class="section-header">Color Code</div>
          <div class="legend-items">
            <div class="legend-item"><span class="legend-dot up"></span> Operational</div>
            <div class="legend-item"><span class="legend-dot degraded"></span> Degraded</div>
            <div class="legend-item"><span class="legend-dot down"></span> Down</div>
            <div class="legend-item"><span class="legend-dot cold"></span> Cold (low traffic)</div>
            <div class="legend-item"><span class="legend-dot empty"></span> No data</div>
          </div>
        </div>
      `;

      app.innerHTML = html;
      setupTooltips();
    }

    /* -- Tooltips -- */
    function setupTooltips() {
      const tooltip = document.getElementById('tooltip');
      const bars = document.querySelectorAll('.bar');

      bars.forEach(bar => {
        bar.addEventListener('mouseenter', () => {
          const time = bar.dataset.time;
          const status = bar.dataset.status;
          const detail = bar.dataset.detail;

          tooltip.innerHTML = `
            <div class="tooltip-time">${time}</div>
            <div class="tooltip-status">
              <span class="tooltip-dot ${status}"></span>
              ${statusLabel(status)}
            </div>
            <div>${detail}</div>
          `;
          tooltip.classList.add('visible');
        });

        bar.addEventListener('mousemove', (e) => {
          const tw = tooltip.offsetWidth;
          const vw = window.innerWidth;
          let left = e.clientX - tw / 2;
          if (left < 8) left = 8;
          if (left + tw > vw - 8) left = vw - tw - 8;
          tooltip.style.left = left + 'px';
          tooltip.style.top = (e.clientY - tooltip.offsetHeight - 12) + 'px';
        });

        bar.addEventListener('mouseleave', () => {
          tooltip.classList.remove('visible');
        });
      });
    }

    /* -- Init -- */
    async function init() {
      const data = await loadAll();
      render(data);
      setInterval(async () => {
        const fresh = await loadAll();
        render(fresh);
      }, REFRESH_MS);
    }

    init();
  </script>
</body>
</html>
